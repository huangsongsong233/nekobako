<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>nekobako</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">

  <div class="page" id="page-home" style="transform: translateX(0); z-index: 1;">
    <div class="home-screen">
      <div class="screen-center">
        <div class="time" id="clock">00:00</div>
        <div class="date" id="date">1月1日 星期一</div>
      </div>

      <div class="desktop-apps">
        <div class="app-icon-wrapper" onclick="openWechatList()">
          <div class="app-icon wechat-icon">💬</div>
          <div class="app-name">微信</div>
        </div>
      </div>

      <div class="dock">
        <div class="icon icon-phone" title="电话">📞</div>
        <div class="icon icon-contacts" title="联系人" onclick="openContactsPage()">👤</div>
        <div class="icon icon-messages" title="信息">💬</div>
        <div class="icon icon-settings" title="设置" onclick="openPage('page-settings')">⚙️</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-screen">
      <div class="header">
        <a href="javascript:void(0)" class="back-btn" onclick="closePage('page-settings')">‹ 返回桌面</a>
        <div class="settings-title">大模型</div>
      </div>

      <div class="form-group">
        <label>预设名称</label>
        <input type="text" id="preset-name" placeholder="例如：DeepSeek 接口" value="我的默认配置">
      </div>

      <div class="form-group">
        <label>Base URL (以 v1 结尾)</label>
        <input type="text" id="base-url" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
        
        <label style="margin-top: 15px;">API Key</label>
        <input type="password" id="api-key" placeholder="sk-xxxxxxxxxxxxxxxxxxx">
      </div>

      <button class="btn btn-primary" id="fetch-btn" onclick="fetchModels()">拉取可用模型</button>
      
      <div class="form-group">
        <label>选择模型</label>
        <select id="model-select">
          <option value="">请先拉取模型</option>
        </select>
      </div>

      <button class="btn btn-success" onclick="savePreset()">保存此预设</button>

      <div class="preset-list">
        <h3 style="font-size: 16px; margin-bottom: 15px; color: #fff;">已保存的预设</h3>
        <div id="preset-list-container"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-wechat-list">
    <div class="wechat-screen">
      <div class="wechat-header">
        <a href="javascript:void(0)" class="wechat-back" onclick="closePage('page-wechat-list')">‹ 桌面</a>
        <div class="wechat-title">微信</div>
      </div>
      <div class="contact-list" id="wechat-list-container" style="background: white;">
      </div>
    </div>
  </div>

  <div class="page" id="page-chat">
    <div class="wechat-screen">
      <div class="wechat-header">
        <a href="javascript:void(0)" class="wechat-back" onclick="closePage('page-chat')">‹ 微信</a>
        <div class="wechat-title" id="chat-title">加载中...</div>
      </div>
      <div class="chat-container" id="chat-box">
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="message-input" placeholder="发消息..." rows="1"></textarea>
        <div class="chat-action-btn" id="emoji-btn" onclick="toggleBottomDrawer('emoji')">😊</div>
        <div class="chat-action-container">
          <div class="chat-action-btn plus-btn" id="plus-btn" onclick="toggleBottomDrawer('plus')">➕</div>
          <button class="chat-send-btn hidden" id="send-btn" onclick="sendMessage()">发送</button>
        </div>
      </div>
      
      <div class="bottom-drawer" id="bottom-drawer">
        <div class="drawer-panel" id="emoji-panel" style="display: none;">
          <p style="text-align:center; color:#888; padding-top:30px;">表情包功能开发中...</p>
        </div>
        <div class="drawer-panel" id="plus-panel" style="display: none;">
          <div class="drawer-grid">
<div class="drawer-item" onclick="regenerateMessage()">
              <div class="drawer-icon">🔄</div>
              <div class="drawer-text">重新生成</div>
            </div>
            </div>
        </div>
      </div>
      
    </div>
  </div>

  <div class="page" id="page-contacts-list">
    <div class="settings-screen">
      <div class="nav-header">
        <a href="javascript:void(0)" class="nav-btn" onclick="closePage('page-contacts-list')">‹ 返回桌面</a>
        <div class="nav-title">联系人</div>
        <a href="javascript:void(0)" class="nav-btn" style="font-size: 24px;" onclick="openNewContactPage()">+</a>
      </div>
      <div class="contact-list" id="contact-list-container">
      </div>
    </div>
  </div>

  <div class="page" id="page-add-contact">
    <div class="settings-screen">
      <div class="nav-header">
        <a href="javascript:void(0)" class="nav-btn" onclick="closePage('page-add-contact')">取消</a>
        <div class="nav-title" id="contact-page-title">新建联系人</div>
        <button class="nav-btn" onclick="saveContact()" style="font-weight: 600;">完成</button>
      </div>

      <div class="avatar-upload-section">
        <label class="avatar-upload-btn" for="avatar-input" id="avatar-preview-container">
          <span>添加照片</span>
          <img id="avatar-preview" src="" style="display: none;">
        </label>
        <input type="file" id="avatar-input" accept="image/*" onchange="previewAvatar(event)">
      </div>

      <div class="form-group" style="padding: 0; background: transparent;">
        <div style="background-color: #2c2c2e; border-radius: 10px; padding: 5px 15px; margin-bottom: 20px;">
          <input type="text" id="contact-name" placeholder="姓名" style="width: 100%; font-size: 18px; padding: 10px 0; border: none; background: transparent; color: white; outline: none;">
        </div>
        <label style="color: #8e8e93; font-size: 14px; margin-bottom: 8px; display: block; padding-left: 5px;">角色设定 (System Prompt)</label>
        <textarea class="form-control" id="contact-prompt" placeholder="例如: 设定你的专属角色……"></textarea>
        
        <button id="delete-contact-btn" onclick="deleteContact()" style="display: none; width: 100%; background-color: #ff3b30; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; margin-top: 20px; font-weight: 600;">删除该联系人</button>
      </div>
    </div>
  </div>

</div>

<script src="js/main.js"></script>
<script src="js/settings.js"></script>
<script src="js/contacts.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
