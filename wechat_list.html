<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微信 - nekobako</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wechat-screen">
  <div class="wechat-header">
    <a href="index.html" class="wechat-back">‹ 桌面</a>
    <div class="wechat-title">微信(1)</div>
  </div>

  <div class="contact-list" id="wechat-list-container" style="background: white;">
    </div>
</div>

<script src="js/contacts.js"></script>
<script>
  // 当点击列表中的某个人时，带着他的 ID 跳转到聊天房间
  function openChat(contactId) {
    window.location.href = `chat.html?id=${contactId}`;
  }

  // 临时覆盖 renderContacts 以适应微信列表的点击事件
  document.addEventListener('DOMContentLoaded', () => {
    const listContainer = document.getElementById('wechat-list-container');
    const contacts = JSON.parse(localStorage.getItem('nekobako_contacts')) || [];

    if (contacts.length === 0) {
      listContainer.innerHTML = '<p style="color:#8e8e93; font-size:14px; text-align:center; padding: 20px;">暂无聊天消息<br>请先去桌面“联系人”添加角色</p>';
      return;
    }

    listContainer.innerHTML = '';
    contacts.forEach(contact => {
      const item = document.createElement('div');
      item.className = 'contact-item';
      item.style.padding = '15px'; // 微信列表稍微宽一点
      item.style.color = '#333'; // 黑字
      item.onclick = () => openChat(contact.id); // 绑定点击事件！
      
      let avatarHTML = contact.avatar 
        ? `<img src="${contact.avatar}">` 
        : contact.name.charAt(0).toUpperCase();

      item.innerHTML = `
        <div class="avatar-circle" style="border-radius: 4px;">${avatarHTML}</div>
        <div class="contact-name" style="color: #333;">${contact.name}</div>
      `;
      listContainer.appendChild(item);
    });
  });
</script>
</body>
</html>
