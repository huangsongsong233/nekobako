<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>API 配置 - nekobako</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="settings-screen">
  <div class="header">
    <a href="index.html" class="back-btn">‹ 返回</a>
    <div class="settings-title">大模型设置</div>
  </div>

  <div class="form-group">
    <label>预设名称</label>
    <input type="text" id="preset-name" placeholder="例如：DeepSeek 接口" value="我的默认配置">
  </div>

  <div class="form-group">
    <label>Base URL (以 v1 结尾)</label>
    <input type="text" id="base-url" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
    
    <label style="margin-top: 15px;">API Key</label>
    <input type="password" id="api-key" placeholder="sk-xxxxxxxxxxxxxxxxxxx">
  </div>

  <button class="btn btn-primary" id="fetch-btn" onclick="fetchModels()">拉取可用模型</button>
  
  <div class="form-group">
    <label>选择模型</label>
    <select id="model-select">
      <option value="">请先拉取模型</option>
    </select>
  </div>

  <button class="btn btn-success" onclick="savePreset()">保存此预设</button>

  <div class="preset-list">
    <h3 style="font-size: 16px; margin-bottom: 15px; color: #fff;">已保存的预设</h3>
    <div id="preset-list-container">
      </div>
  </div>

</div>

<script src="js/settings.js"></script>
</body>
</html>
