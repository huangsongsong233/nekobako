<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新建联系人 - nekobako</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="settings-screen">
  <div class="nav-header">
    <a href="contacts.html" class="nav-btn">取消</a>
    <div class="nav-title">新建联系人</div>
    <button class="nav-btn" onclick="saveContact()" style="font-weight: 600;">完成</button>
  </div>

  <div class="avatar-upload-section">
    <label class="avatar-upload-btn" for="avatar-input" id="avatar-preview-container">
      <span>添加照片</span>
      <img id="avatar-preview" src="" style="display: none;">
    </label>
    <input type="file" id="avatar-input" accept="image/*" onchange="previewAvatar(event)">
  </div>

  <div class="form-group" style="padding: 0; background: transparent;">
    <div style="background-color: #2c2c2e; border-radius: 10px; padding: 5px 15px; margin-bottom: 20px;">
      <input type="text" id="contact-name" placeholder="姓名 (例如: 贝阿朵莉切)" style="width: 100%; font-size: 18px; padding: 10px 0; border: none; background: transparent; color: white; outline: none;">
    </div>
    
    <label style="color: #8e8e93; font-size: 14px; margin-bottom: 8px; display: block; padding-left: 5px;">角色设定 (System Prompt)</label>
    <textarea class="form-control" id="contact-prompt" placeholder="例如: 你是活了千年的黄金魔女，说话风格傲慢但又带着一丝顽皮，喜欢用‘妾身’自称，精通各种密室诡计……"></textarea>
  </div>
</div>

<script src="js/contacts.js"></script>
</body>
</html>
